name: Weekly Draft Update

on:
  # Every Wednesday at 5:00 AM CST = 11:00 AM UTC
  schedule:
    - cron: '0 11 * * 3'

  # Also lets you trigger it manually from the Actions tab
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Update last_updated date in players.json
        run: |
          TODAY=$(date -u +"%Y-%m-%d")
          # Use jq to update the last_updated field in-place
          jq --arg d "$TODAY" '.last_updated = $d' players.json > players.json.tmp
          mv players.json.tmp players.json
          echo "Updated last_updated to $TODAY"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add players.json
          # Only commit if there's actually a change
          git diff --staged --quiet || git commit -m "chore: weekly draft update $(date -u +%Y-%m-%d)"
          git push
