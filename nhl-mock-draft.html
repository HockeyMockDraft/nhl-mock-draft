function getDefaultOrder(){
  const o=[];
  const n={6:"via FLA",10:"via CHI",14:"via TOR"};
  LOTTERY_TEAMS.forEach((t,i)=>{
    o.push({pick:i+1,team:t.team,name:t.name,color:t.color,note:t.seed===15?"FORFEITED":(n[t.seed]||""),seed:t.seed,lotteryWin:false,jumped:0});
  });
  PLAYOFF_TEAMS.forEach((t,i)=>{
    o.push({pick:i+17,team:t.team,name:t.name,color:t.color,note:t.note,seed:null,lotteryWin:false,jumped:0});
  });
  return o;
}

function simulateLottery(){
  const pool=LOTTERY_TEAMS.map(t=>({...t}));
  const eligible=pool.filter(t=>t.seed<=11); // only seeds 1-11 can win
  const n={6:"via FLA",10:"via CHI",14:"via TOR"};

  // Drawing 1: use base odds for seeds 1-11
  const tot1=eligible.reduce((s,t)=>s+t.odds,0);
  let r1=Math.random()*tot1, w1=eligible[0];
  for(const t of eligible){r1-=t.odds;if(r1<=0){w1=t;break;}}

  // Drawing 2: remove winner, redistribute odds proportionally among remaining 10
  const elig2=eligible.filter(t=>t.seed!==w1.seed);
  const tot2=elig2.reduce((s,t)=>s+t.odds,0);
  let r2=Math.random()*tot2, w2=elig2[0];
  for(const t of elig2){r2-=t.odds;if(r2<=0){w2=t;break;}}

  // Build final order: winners get picks 1 & 2, rest fill in by seed
  const nonWinners=pool.filter(t=>t.seed!==w1.seed&&t.seed!==w2.seed);
  const res=[];
  res.push({pick:1,team:w1.team,name:w1.name,color:w1.color,note:w1.seed===15?"FORFEITED":(n[w1.seed]||""),seed:w1.seed,lotteryWin:true,jumped:w1.seed-1});
  res.push({pick:2,team:w2.team,name:w2.name,color:w2.color,note:w2.seed===15?"FORFEITED":(n[w2.seed]||""),seed:w2.seed,lotteryWin:true,jumped:Math.max(0,w2.seed-2)});
  nonWinners.forEach((t,i)=>{res.push({pick:i+3,team:t.team,name:t.name,color:t.color,note:t.seed===15?"FORFEITED":(n[t.seed]||""),seed:t.seed,lotteryWin:false,jumped:0});});
  PLAYOFF_TEAMS.forEach((t,i)=>{res.push({pick:i+17,team:t.team,name:t.name,color:t.color,note:t.note,seed:null,lotteryWin:false,jumped:0});});
  return res;
}

// === DATA LOADING FROM players.json ===
async function loadPlayersData() {
  const res = await fetch('players.json?cb=' + Date.now());
  if (!res.ok) throw new Error('Failed to load players.json');
  const data = await res.json();
  // Overwrite module-level variables
  LOTTERY_TEAMS.length = 0;
  data.lottery_teams.forEach(t => LOTTERY_TEAMS.push(t));
  PLAYOFF_TEAMS.length = 0;
  data.playoff_teams.forEach(t => PLAYOFF_TEAMS.push(t));
  P.length = 0;
  data.prospects.forEach(p => P.push(p));
  // Rebuild PINFO
  Object.keys(PINFO).forEach(k => delete PINFO[k]);
  Object.assign(PINFO, data.prospect_info);
  LAST_UPDATED = data.last_updated || "Unknown";
}

// === PERSISTENT STORAGE ===
const STORAGE_KEY = "nhl-mock-draft-state";

async function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); return true; }
  catch (e) { return false; }
}

async function loadState() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; }
  catch (e) { return null; }
}

async function clearSavedState() {
  try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
}

  const[announcing,setAnnouncing]=useState(false);
  const tr=useRef();
  const cancelled=useRef(false);
  const speak=(text)=>new Promise(resolve=>{try{window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.rate=0.88;u.pitch=0.9;u.volume=1;u.onend=resolve;u.onerror=resolve;window.speechSynthesis.speak(u);}catch(e){resolve();}});

  const revealSequence=async(results)=>{
    const lottery16=results.slice(0,16);
    cancelled.current=false;
    for(let i=15;i>=0;i--){
      if(cancelled.current) return;
      const pick=lottery16[i];
      const pickNum=i+1;
      const fullName=FULL_NAMES[pick.team]||pick.name;
      setCurrentPick({...pick,pickNum});
      setAnnouncing(true);
      if(pickNum<=5){
        await speak(`The number ${pickNum} overall pick goes to... the ${fullName}`);
      } else {
        await speak(`Pick number ${pickNum}... the ${fullName}`);

      if(cancelled.current) return;
      setAnnouncing(false);
      setRevealedPicks(prev=>[{...pick,pickNum},...prev]);
      setCurrentPick(null);
      await new Promise(r=>setTimeout(r,pickNum<=3?1200:pickNum<=5?800:400));
    }
    setStage("done");
  };

  const run=()=>{
    const res=simulateLottery();

    setStage("revealing");

  };

          <span style={{fontSize:13,color:"rgba(255,255,255,0.5)",letterSpacing:2}}>{filled}/32</span>
          <div style={{height:4,flex:1,marginLeft:8,background:"rgba(0,0,0,0.3)",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${(filled/32)*100}%`,background:"rgba(255,255,255,0.6)",borderRadius:2,transition:"width 0.3s"}}/>
          </div>
        </div>
      </div>
      <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0}}>
        <div style={{flex:ap&&isMe?"0 0 35%":1,overflowY:"auto",padding:"6px 8px",borderBottom:ap&&isMe?`2px solid ${cfg.color}`:"none"}}>
          {order.map(slot=>{
            const pr=mp[slot.pick]?P.find(p=>p.id===mp[slot.pick]):null;
            const ff=slot.note==="FORFEITED";
            const ia=ap===slot.pick&&isMe;
            const teamFull=FULL_NAMES[slot.team]||slot.name;
            return(
              <div key={slot.pick} onClick={()=>{if(!ff&&isMe)setAp(ia?null:slot.pick)}}
                style={{display:"flex",alignItems:"center",gap:20,padding:"8px 10px",marginBottom:3,borderRadius:4,
                  cursor:!ff&&isMe?"pointer":"default",background:ff?"#fafafa":ia?cfg.bg:pr?"#f8f8f8":"#fff",
                  border:`1px solid ${ia?cfg.color:"#eee"}`,opacity:ff?0.3:1,transition:"all 0.1s"}}>
                <span style={{fontSize:14,color:"#aaa",width:24,textAlign:"right",flexShrink:0,fontWeight:700}}>{slot.pick}</span>
                <img src={logoUrl(slot.team)} alt={slot.team} style={{width:32,height:42,objectFit:"contain",flexShrink:0}} onError={e=>{e.target.style.display="none"}}/>
                <div style={{display:"flex",flexDirection:"column",flexShrink:0,minWidth:0,width:pr?130:170}}>
                  <span style={{fontSize:14,fontWeight:800,color:slot.color,lineHeight:1.1}}>{slot.team}</span>
                  <span style={{fontSize:12,color:"#999",lineHeight:1.1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{teamFull.split(" ").pop()}</span>
                </div>
                {slot.lotteryWin&&<span style={{fontSize:12,color:"#b8860b",flexShrink:0}}>★</span>}
                {ff?<span style={{fontSize:12,color:"#bbb",fontStyle:"italic"}}>Forfeited</span>
                :pr?<div style={{flex:1,minWidth:0,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span onClick={e=>{e.stopPropagation();setViewPlayer(pr)}} style={{fontSize:15,color:"#222",fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",cursor:"pointer",borderBottom:"1px dotted #ccc"}}>{pr.nat} {pr.name}</span>
                  <span style={{fontSize:12,color:"#999",flexShrink:0,marginLeft:4,background:"#f0f0f0",padding:"8px 16px",borderRadius:2,fontWeight:600}}>{pr.pos}</span>
                </div>
                :<span style={{fontSize:13,color:ia?cfg.accent:"#ddd",flex:1}}>{ia?"← Pick a prospect":"—"}</span>}
                {slot.note&&slot.note!=="FORFEITED"&&<span style={{fontSize:11,color:"#bbb",flexShrink:0}}>({slot.note})</span>}
                {pr&&!ff&&isMe&&<button onClick={e=>{e.stopPropagation();onClear(gi,slot.pick)}} style={{background:"none",border:"none",color:"#ccc",cursor:"pointer",fontSize:13,padding:"0 2px",flexShrink:0}}>✕</button>}
              </div>
            );
          })}
        </div>
        {ap&&isMe&&<div style={{flex:"1 1 65%",display:"flex",flexDirection:"column",minHeight:0,background:"#fafafa"}}>
          <div style={{padding:"4px 5px 2px",flexShrink:0,display:"flex",gap:8,alignItems:"center"}}>
            <img src={logoUrl(order.find(d=>d.pick===ap)?.team)} alt="" style={{width:26,height:26,objectFit:"contain"}} onError={e=>{e.target.style.display="none"}}/>
            <span style={{fontSize:14,color:cfg.accent,fontWeight:700,letterSpacing:1,flexShrink:0}}>#{ap} {FULL_NAMES[order.find(d=>d.pick===ap)?.team]||order.find(d=>d.pick===ap)?.team}</span>
            <input value={sr} onChange={e=>setSr(e.target.value)} placeholder="Search..."
              style={{flex:1,background:"#fff",border:"1px solid #ddd",borderRadius:3,color:"#333",padding:"3px 6px",fontSize:14,fontFamily:"inherit",outline:"none",minWidth:0}}/>
          </div>
          <div style={{display:"flex",gap:4,padding:"2px 5px 3px",flexWrap:"wrap",flexShrink:0}}>
            {PF.map(pos=><button key={pos} onClick={()=>setPf2(pos)} style={{background:pf===pos?cfg.color+"20":"#fff",border:`1px solid ${pf===pos?cfg.color+"55":"#ddd"}`,color:pf===pos?cfg.accent:"#888",padding:"8px 16px",borderRadius:2,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{pos}</button>)}
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"0 5px 5px",display:"flex",flexDirection:"column",gap:2}}>
            {fp.map(p=>{const tk=myIds.has(p.id)||otherIds.has(p.id);
              return(<div key={p.id} onClick={()=>!tk&&setViewPlayer(p)} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:3,background:tk?"#fafafa":"#fff",border:`1px solid ${tk?"#f0f0f0":"#e8e8e8"}`,cursor:tk?"default":"pointer",opacity:tk?0.3:1,transition:"all 0.1s"}}
                onMouseEnter={e=>{if(!tk)e.currentTarget.style.borderColor=cfg.color+"66"}}
                onMouseLeave={e=>{if(!tk)e.currentTarget.style.borderColor="#e8e8e8"}}>
                {p.tier<=2?<span style={{fontSize:11,color:TC[p.tier],fontWeight:700,width:22,flexShrink:0}}>{TL[p.tier]}</span>:<span style={{width:22,flexShrink:0}}/>}
                <span style={{fontSize:14}}>{p.nat}</span>
                <span style={{fontSize:14,fontWeight:700,color:tk?"#bbb":"#222",flex:1,minWidth:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</span>
                <span style={{fontSize:12,background:"#f0f0f0",padding:"4px 10px",borderRadius:2,color:"#777",fontWeight:600,flexShrink:0}}>{p.pos}</span>
                <span style={{fontSize:12,color:"#bbb",flexShrink:0}}>{p.team}</span>
              </div>);
            })}
          </div>
        </div>}
      </div>
      {viewPlayer&&<PlayerInfoModal prospect={viewPlayer} onClose={()=>setViewPlayer(null)} canDraft={ap!==null&&isMe&&!myIds.has(viewPlayer.id)&&!otherIds.has(viewPlayer.id)} onDraft={(pid)=>{sel(pid)}}/>}
    </div>
  );
}

function App(){
  const[order,setOrder]=useState(getDefaultOrder);
  const[picks,setPicks]=useState({0:{}});
  const[showLot,setShowLot]=useState(false);
  const[lotDone,setLotDone]=useState(false);
  const[activeGm,setActiveGm]=useState(0);
  const[loaded,setLoaded]=useState(false);
  const[dataReady,setDataReady]=useState(false);
  const[saveStatus,setSaveStatus]=useState("");


  // Load players.json first, then saved state
  useEffect(()=>{
    let done=false;
    (async()=>{
      try{
        await loadPlayersData();
        setDataReady(true);
        // reset order now that real data is loaded
        setOrder(getDefaultOrder());
      }catch(e){ console.error('Failed to load players.json:',e); setDataReady(true); }
      try{
        const saved=await loadState();
        if(saved&&!done){
          if(saved.order) setOrder(saved.order);
          if(saved.picks) setPicks(saved.picks);
          if(saved.lotDone!==undefined) setLotDone(saved.lotDone);
          if(saved.activeGm!==undefined&&saved.activeGm!==null) setActiveGm(saved.activeGm);
        }
      }catch(e){}
      done=true;
      setLoaded(true);
    })();
    setTimeout(()=>{if(!done){done=true;setLoaded(true);setDataReady(true);}},2000);
  },[]);

  // Auto-save on changes
  useEffect(()=>{
    if(!loaded) return;
    const t=setTimeout(()=>{
      saveState({order,picks,lotDone,activeGm}).then(ok=>{
        if(ok){setSaveStatus("saved");setTimeout(()=>setSaveStatus(""),1500);}
      });
    },300);
    return()=>clearTimeout(t);
  },[order,picks,lotDone,activeGm,loaded]);

  const mkPick=(gi,pn,pid)=>setPicks(pr=>({...pr,[gi]:{...pr[gi],[pn]:pid}}));
  const clPick=(gi,pn)=>setPicks(pr=>{const c={...pr[gi]};delete c[pn];return{...pr,[gi]:c}});
  const totPicks=Object.keys(picks[0]||{}).length;

  const fullReset=()=>{
    setOrder(getDefaultOrder());setLotDone(false);setPicks({0:{}});clearSavedState();
  };

  if(!loaded||!dataReady){
    return(
      <div style={{minHeight:"100vh",background:"#f5f5f5",color:"#333",fontFamily:"'Courier New',monospace",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:19,color:"#999",letterSpacing:3,marginBottom:8}}>LOADING DRAFT...</div>
          <div style={{width:50,height:50,border:"3px solid #ddd",borderTopColor:"#e63946",borderRadius:"50%",margin:"0 auto",animation:"spin 0.8s linear infinite"}}/>
        </div>
        <style>{`@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}} @keyframes counterspin{0%{transform:rotate(0deg)}100%{transform:rotate(-360deg)}}`}</style>
      </div>
    );
  }

  if(activeGm===null){
    return(
      <div style={{minHeight:"100vh",background:"#f5f5f5",color:"#333",fontFamily:"'Courier New',monospace",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
        <div style={{letterSpacing:5,fontSize:15,color:"#999",marginBottom:4}}>2026 NHL</div>
        <h1 style={{fontSize:"clamp(32px,7vw,56px)",fontWeight:900,marginBottom:6,background:"linear-gradient(135deg,#222,#666)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>MOCK DRAFT</h1>
        <p style={{color:"#999",fontSize:16,marginBottom:38,letterSpacing:2}}>PICK YOUR GM TO START DRAFTING</p>
        {totPicks>0&&<div style={{background:"rgba(184,134,11,0.08)",border:"1px solid rgba(184,134,11,0.2)",borderRadius:6,padding:"8px 16px",marginBottom:30,textAlign:"center"}}>
          <span style={{fontSize:15,color:"#b8860b",letterSpacing:1}}>📋 SAVED DRAFT FOUND — {totPicks} picks made</span>
        </div>}
        <div style={{display:"flex",gap:26,flexWrap:"wrap",justifyContent:"center"}}>
          {GC.filter(c=>!c.auto).map(cfg=>{
            const gPicks=Object.keys(picks[cfg.id]||{}).length;
            return(
              <button key={cfg.id} onClick={()=>setActiveGm(cfg.id)} style={{background:"#fff",border:`2px solid ${cfg.color}`,borderRadius:12,padding:"24px 44px",cursor:"pointer",transition:"all 0.2s",display:"flex",flexDirection:"column",alignItems:"center",gap:8,minWidth:130,fontFamily:"inherit",boxShadow:"0 2px 8px rgba(0,0,0,0.06)"}}
                onMouseEnter={e=>e.currentTarget.style.background=cfg.bg} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                <div style={{width:56,height:56,borderRadius:"50%",background:cfg.hdr,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <span style={{fontSize:26,fontWeight:900,color:"#fff"}}>{cfg.name[0]}</span>
                </div>
                <span style={{fontSize:22,fontWeight:900,color:cfg.accent,letterSpacing:2}}>{cfg.name.toUpperCase()}</span>
                {gPicks>0&&<span style={{fontSize:13,color:"#999"}}>{gPicks}/32 picks</span>}
              </button>
            );
          })}
        </div>
        {totPicks>0&&<button onClick={fullReset} style={{marginTop:20,background:"rgba(230,57,70,0.06)",border:"1px solid rgba(230,57,70,0.2)",color:"#e63946",padding:"6px 16px",borderRadius:4,fontSize:14,cursor:"pointer",fontFamily:"inherit",letterSpacing:1}}>🗑 CLEAR SAVED DRAFT & START FRESH</button>}
        <p style={{color:"#ccc",fontSize:14,marginTop:24,letterSpacing:2}}>YOUR PICKS AUTO-SAVE · COME BACK ANYTIME</p>
        <style>{`@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}} @keyframes counterspin{0%{transform:rotate(0deg)}100%{transform:rotate(-360deg)}} @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}} @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}`}</style>
      </div>
    );
  }

  return(
    <div style={{minHeight:"100vh",background:"#f5f5f5",color:"#333",fontFamily:"'Courier New',monospace"}}>
      {showLot&&<LotteryModal onClose={()=>setShowLot(false)} onComplete={r=>{setOrder(r);setLotDone(true);setPicks({0:{}});setShowLot(false)}}/>}
      <div style={{position:"relative",zIndex:1,maxWidth:1500,margin:"0 auto",padding:"12px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5,flexWrap:"wrap",gap:5}}>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <h1 style={{fontSize:"clamp(18px,3vw,28px)",fontWeight:900,margin:0,background:"linear-gradient(135deg,#222,#666)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>2026 NHL MOCK DRAFT</h1>
            {lotDone&&<span style={{fontSize:13,color:"#b8860b",letterSpacing:1}}>★ LOTTERY</span>}
            <span style={{fontSize:12,color:"#bbb",letterSpacing:1}}>Updated {LAST_UPDATED}</span>
            <span style={{fontSize:13,color:GC[activeGm].accent,letterSpacing:1,background:GC[activeGm].bg,padding:"4px 10px",borderRadius:3,border:`1px solid ${GC[activeGm].color}22`}}>Playing as {GC[activeGm].name}</span>
            {saveStatus&&<span style={{fontSize:12,color:"#16a34a",letterSpacing:1,transition:"opacity 0.3s"}}>✓ SAVED</span>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:13,color:"#999"}}>{totPicks}/32</span>
            <button onClick={()=>setShowLot(true)} style={{background:"linear-gradient(135deg,rgba(184,134,11,0.1),rgba(230,81,0,0.1))",border:"1px solid rgba(184,134,11,0.3)",color:"#b8860b",padding:"8px 16px",borderRadius:3,fontSize:13,cursor:"pointer",fontFamily:"inherit",letterSpacing:1,fontWeight:700}}>🎱 LOTTERY</button>
            <button onClick={()=>setPicks({0:{}})} style={{background:"#fff",border:"1px solid #ddd",color:"#888",padding:"8px 16px",borderRadius:3,fontSize:13,cursor:"pointer",fontFamily:"inherit",letterSpacing:1}}>↩ CLEAR</button>
            <button onClick={fullReset} style={{background:"rgba(230,57,70,0.06)",border:"1px solid rgba(230,57,70,0.2)",color:"#e63946",padding:"8px 16px",borderRadius:3,fontSize:13,cursor:"pointer",fontFamily:"inherit",letterSpacing:1}}>⟳ RESET</button>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr",gap:7,height:"calc(100vh - 52px)",minHeight:500,maxWidth:800,margin:"0 auto"}}>
          {[0].map(i=><GMPanel key={i} gi={i} order={order} allPicks={picks} onPick={mkPick} onClear={clPick} activeGm={activeGm}/>)}
        </div>
      </div>
      <style>{`@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}} @keyframes counterspin{0%{transform:rotate(0deg)}100%{transform:rotate(-360deg)}} @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}} @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}`}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
